<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Solicitudes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background">
        <div class="blur blur-1"></div>
        <div class="blur blur-2"></div>
        <div class="blur blur-3"></div>
    </div>

    <main class="wrapper">
        <section class="card">
            <div class="ticket-icon-box">
                <div class="ticket-glow"></div>
                <div class="ticket-icon">🎫</div>
            </div>

            <h1>Clasificador de Solicitudes</h1>
            <p class="subtitle">Ingresa un texto y el sistema predecirá su categoría.</p>

            <form method="POST" class="formulario">
                <input
                    type="text"
                    name="ticket_id"
                    placeholder="ID de la solicitud"
                    value="{{ ticket_id }}"
                    readonly
                >

                <input
                    type="text"
                    name="asunto"
                    placeholder="Asunto del problema"
                    value="{{ asunto_ingresado }}"
                >

                <textarea
                    name="texto"
                    placeholder="Describe el problema detalladamente..."
                    rows="6"
                    required
                >{{ texto_ingresado }}</textarea>

                <button type="submit">
                    <span>Clasificar</span>
                    <span class="send-icon">✈</span>
                </button>
            </form>

            {% if prediccion %}
            <div class="resultado">
                <span class="resultado-label">Resultado</span>
                <span class="resultado-valor">{{ prediccion }}</span>
            </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
